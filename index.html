<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Absensi Codenary X IPI</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #f8f9fa;
    }
    .container {
      width: 100%;
      height: 100%;
      position: relative;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 18px;
      color: #555;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="loading" id="loading">Memuat absensi...</div>
    <iframe 
      id="absensiFrame"
      src="https://script.google.com/macros/s/AKfycbxdhXsJLe3umxC10g6q1xHMdsMQAxBo2PssxIBQgKlKwV3c7aEyVXPABZRCxzHwcwrb_w/exec"
      allow="camera *; microphone *; geolocation *; fullscreen"
      allowfullscreen
      onload="hideLoading()">
    </iframe>
  </div>

  <script>
    function hideLoading() {
      document.getElementById('loading').style.display = 'none';
    }
  </script>
</body>
</html>
